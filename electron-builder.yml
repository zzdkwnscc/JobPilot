appId: com.jobpilot.desktop
productName: JobPilot

directories:
  output: release-installer
  buildResources: resources

files:
  - package.json
  - electron/**/*
  - .next/standalone/**/*
  - .next/static/**/*
  - public/**/*
  - drizzle/**/*
  - messages/**/*

asarUnpack:
  - '**/*.node'
  - '**/better-sqlite3/**/*'

win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
