name: Desktop CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: desktop-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Desktop Boundary
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> .codex-cargo-target/desktop-tauri

      - name: Install dependencies
        run: pnpm install

      - name: Verify desktop version sync
        run: pnpm run verify:desktop:version-sync

      - name: Verify desktop migration gate
        run: pnpm run verify:desktop:migration

      - name: Observe web reference lint debt
        if: always()
        continue-on-error: true
        run: pnpm run report:web:reference

      - name: Verify desktop release readiness
        run: pnpm run verify:desktop:release-readiness

  build:
    name: Build (${{ matrix.target }})
    if: github.event_name != 'pull_request'
    needs: verify
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            rust_target: x86_64-pc-windows-msvc
            artifact_ext: exe
          - target: aarch64-apple-darwin
            runner: macos-latest
            rust_target: aarch64-apple-darwin
            artifact_ext: dmg

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> .codex-cargo-target/desktop-tauri
          key: ${{ matrix.rust_target }}

      - name: Install dependencies
        run: pnpm install

      - name: Verify desktop version sync
        run: pnpm run verify:desktop:version-sync

      - name: Ensure updater signing key
        if: runner.os == 'Windows'
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            pnpm --prefix desktop exec tauri signer generate --ci --write-keys .tauri/updater.key --force
          } else {
            Write-Host "Using repository TAURI_SIGNING_PRIVATE_KEY secret."
          }
        shell: powershell
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Ensure updater signing key (macOS)
        if: runner.os == 'macOS'
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            pnpm --prefix desktop exec tauri signer generate --ci --write-keys .tauri/updater.key --force
          else
            echo "Using repository TAURI_SIGNING_PRIVATE_KEY secret."
          fi
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build Tauri Desktop
        run: pnpm run build:tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Desktop Artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: rolerover-desktop-windows-${{ github.sha }}
          path: |
            .codex-cargo-target/desktop-tauri/release/bundle/**/*.exe
            .codex-cargo-target/desktop-tauri/release/bundle/**/*.exe.sig
            .codex-cargo-target/desktop-tauri/release/bundle/**/*.msi
            .codex-cargo-target/desktop-tauri/release/bundle/**/*.msi.sig
            .codex-cargo-target/desktop-tauri/release/bundle/**/*.zip
            .codex-cargo-target/desktop-tauri/release/bundle/**/*.zip.sig
          if-no-files-found: error

      - name: Upload Desktop Artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: rolerover-desktop-macos-${{ matrix.target }}-${{ github.sha }}
          path: |
            .codex-cargo-target/desktop-tauri/release/bundle/**/*.dmg
            .codex-cargo-target/desktop-tauri/release/bundle/**/*.dmg.sig
            .codex-cargo-target/desktop-tauri/release/bundle/**/*.app
            .codex-cargo-target/desktop-tauri/release/bundle/**/*.app.tar.gz
            .codex-cargo-target/desktop-tauri/release/bundle/**/*.app.tar.gz.sig
          if-no-files-found: error
