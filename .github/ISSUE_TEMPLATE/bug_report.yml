name: 🐛 Bug Report / Bug 报告
description: Report a bug or issue / 报告错误或问题
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你花时间填写这个 Bug 报告！
        Thanks for taking the time to fill out this bug report!

  - type: dropdown
    id: platform
    attributes:
      label: Platform / 平台
      description: Which platform are you using? / 你使用的是哪个平台？
      options:
        - Windows
        - macOS (Apple Silicon)
        - macOS (Intel)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / 版本
      description: What version of JobPilot are you using? / 你使用的 JobPilot 版本是？
      placeholder: "e.g., v1.5.2"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened? / 发生了什么？
      description: Describe the bug / 描述这个 Bug
      placeholder: A clear and concise description of what the bug is / 清晰简洁地描述这个问题
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior / 预期行为
      description: What did you expect to happen? / 你期望发生什么？
      placeholder: What should have happened / 应该发生什么
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce / 复现步骤
      description: How can we reproduce this? / 如何复现？
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / 日志
      description: Please copy and paste any relevant log output / 请复制粘贴相关的日志输出
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our Code of Conduct
      options:
        - label: I have searched existing issues to avoid duplicates / 我已搜索现有 Issue 以避免重复
          required: true
